<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="card" style="max-width:420px;margin:40px auto;">
      <h1>Login</h1>
      <form id="loginForm" class="grid form-grid">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log In</button>
      </form>
      <p id="loginMsg"></p>
      <p style="margin-top:12px;">No account? <a href="register.html">Register here</a>.</p>
    </section>
  </main>
  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('loginMsg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const fd = new FormData(form);
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
      });
      const data = await res.json();
      if (!res.ok) { msg.textContent = data.error || 'Login failed'; return; }
      location.href = 'index.html';
    });
  </script>
</body>
</html>
