<body data-page="status">
<header class="topbar"><div><h1>Update Reading Status</h1><p>Unread, Reading, Read</p></div><nav><a href="index.html">Home</a><a href="books.html">Books</a><a href="manage.html">Manage</a><a href="status.html">Status</a><a href="search.html">Search</a></nav></header>
<main class="container"><section class="card grid form-grid"><select id="statusBookSelect"></select><select id="statusSelect"><option>Unread</option><option>Reading</option><option>Read</option></select><div class="toolbar"><button id="saveStatus">Save Status</button></div><div id="statusList"></div></section></main>
<script>
(async () => {
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    const data = await res.json();
    if (!data.loggedIn) window.location.replace('/login.html');
  } catch (err) {
    window.location.replace('/login.html');
  }
})();
</script>
